<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কনকপুর তরুণ সংঘ</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5}
.topbar{display:flex;align-items:center;gap:10px;background:#8B0000;color:#fff;padding:10px 15px}
.topbar img{width:45px;height:45px;border-radius:50%}
.title{font-size:22px;font-weight:bold}
.sidebar{position:fixed;top:0;left:-260px;width:250px;height:100%;background:#222;transition:.3s;padding-top:20px}
.sidebar.active{left:0}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:15px 20px}
.content{padding:20px}
video{width:100%;border-radius:10px}
.switch{margin-left:auto;position:relative;display:inline-block;width:52px;height:28px}
.switch input{display:none}
.slider{position:absolute;inset:0;background:#ccc;border-radius:34px;cursor:pointer;transition:.3s}
.slider:before{content:"";position:absolute;width:20px;height:20px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.3s}
input:checked + .slider{background:#4CAF50}
input:checked + .slider:before{transform:translateX(24px)}
.dark-mode{background:#121212;color:#fff}
.dark-mode .content,.dark-mode .sidebar{background:#121212;color:#fff}
.dark-mode footer{background:#1f1f1f!important;color:#fff!important}
</style>
</head>
<body>
<div class="topbar">
<span onclick="toggleMenu()" style="font-size:30px;cursor:pointer;">☰</span>
<img src="123.png.png" alt="Logo">
<span class="title">কনকপুর তরুণ সংঘ</span>
<label class="switch">
<input type="checkbox" id="darkToggle" onchange="toggleDarkMode()">
<span class="slider"></span>
</label>
</div>

<script>
function toggleMenu(){document.getElementById('menu').classList.toggle('active');}
function toggleDarkMode(){
 document.body.classList.toggle('dark-mode');
 const d=document.body.classList.contains('dark-mode');
 localStorage.setItem('darkMode',d);
 document.getElementById('darkToggle').checked=d;
}
window.onload=function(){
 const d=localStorage.getItem('darkMode')==='true';
 if(d){document.body.classList.add('dark-mode');}
 document.getElementById('darkToggle').checked=d;
}
</script>
</body>
